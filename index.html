<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Plano de Estudos AUVP Escola</title>
    <meta
      name="description"
      content="Acompanhe seu progresso na grade da AUVP Escola: módulos, aulas, durações e plano de estudos personalizado."
    />
    <meta property="og:title" content="Plano de Estudos AUVP Escola" />
    <meta
      property="og:description"
      content="Sistema de acompanhamento de aulas para alunos da AUVP Escola."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Anek+Latin:wght@300;400;500;600;700;800&family=Roboto:wght@300;400;500;700&family=Sora:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      // Aplica o tema salvo antes do primeiro paint para evitar flash.
      (function () {
        try {
          var t = localStorage.getItem("auvp-theme-v1");
          if (
            t === "dark" ||
            (!t && matchMedia("(prefers-color-scheme: dark)").matches)
          ) {
            document.documentElement.classList.add("dark");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
